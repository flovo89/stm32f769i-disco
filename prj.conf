# ─── Simulation mode ─────────────────────────────────────────────────────────
# Uncomment to replace ADC/encoder with a synthetic SPMSM motor model.
# PWM outputs remain active — use an oscilloscope to verify duty cycles.
# CONFIG_MOTOR_SIM=y

# ─── Core ────────────────────────────────────────────────────────────────────
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=32768

# Higher tick rate for 10 kHz control loop (100 µs resolution)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000

# ─── Drivers ─────────────────────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_PWM=y

# ─── Math / printf with float support ────────────────────────────────────────
CONFIG_CBPRINTF_FP_SUPPORT=y

# ─── Logging ─────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ─── Shell over USART1 (ST-Link VCP, 115200 baud) ────────────────────────────
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_UART_CONSOLE=y

# ─── Entropy (required by networking stack for sys_rand_get) ─────────────────
CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_STM32_RNG=y

# ─── Networking (Ethernet UDP interface) ─────────────────────────────────────
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_ARP=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=30
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.7.100"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.7.1"
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_ETH_STM32_HAL=y
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
